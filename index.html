<!DOCTYPE html>
<html>
<head>
  <title>Pinpoint</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
</head>

<body class="bg-gray-100">

<header class="bg-black text-white p-4 text-xl font-bold">
  📍 Pinpoint
</header>

<div class="p-4 space-y-3">

  <input id="name" class="w-full p-2 border" placeholder="Location Name">
  <input id="desc" class="w-full p-2 border" placeholder="Address">

  <button onclick="createPin()" class="bg-green-600 text-white px-4 py-2">
    Create Pin
  </button>

  <div id="result" class="mt-5"></div>

</div>

<script src="app.js"></script>
</body>
</html>
